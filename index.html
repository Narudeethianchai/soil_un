<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model (Fixed & Beautiful)</title>
    
    <!-- สไตล์การตกแต่งอินเตอร์เฟสให้สวยงามและอ่านง่าย -->
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --background-color: #f8fafc;
            --card-background: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-background);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 24px;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
            width: 100%;
            margin-bottom: 20px;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #e2e8f0;
            border-radius: 12px;
            width: 220px;
            height: 220px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #edf2f7;
        }

        /* บังคับรูปทรงแคนวาสกล้องให้พอดีกรอบรูป */
        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        #label-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .prediction-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f1f5f9;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            border-left: 4px solid #cbd5e1;
            transition: all 0.2s ease;
        }

        .class-name {
            color: var(--text-main);
        }

        .probability {
            color: var(--primary-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <div class="subtitle">ระบบวิเคราะห์ภาพถ่ายจากกล้อง (อัปเดตใหม่ทุก ๆ 3 วินาที)</div>
    
    <button type="button" id="start-btn" onclick="init()">เริ่มเปิดกล้องทำงาน</button>
    
    <div id="webcam-container"></div>
    <div id="label-container">
        <div class="prediction-row" style="justify-content: center;">
            <span class="class-name">กรุณากดปุ่มเพื่อเริ่มต้นทำงาน</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลของคุณจาก Teachable Machine[cite: 3]
    const URL = "https://teachablemachine.withgoogle.com/models/AZxNjDtyN/";[cite: 3]

    let model, webcam, labelContainer;
    let lastPredictTime = 0; // ตัวแปรเก็บเวลาสำหรับคำนวณหน่วงเวลา 3 วินาที

    // โหลดโมเดลและตั้งค่ากล้องเริ่มต้น[cite: 3]
    async function init() {
        const startBtn = document.getElementById("start-btn");
        startBtn.disabled = true;
        startBtn.innerText = "กำลังเชื่อมต่อโมเดล...";

        try {
            const modelURL = URL + "model.json";[cite: 3]
            const metadataURL = URL + "metadata.json";[cite: 3]

            // โหลดโมเดลและเก็บค่า[cite: 3]
            model = await tmImage.load(modelURL, metadataURL);[cite: 3]

            // ตั้งค่าเว็บแคม (ปรับเป็นขนาด 220x220 เพื่อความสวยงาม)[cite: 3]
            const flip = true;[cite: 3]
            webcam = new tmImage.Webcam(220, 220, flip);[cite: 3]
            await webcam.setup(); // ขอสิทธิ์เปิดใช้งานกล้อง[cite: 3]
            await webcam.play();[cite: 3]
            
            // นำวิดีโอกล้องใส่ลงในกล่องข้อความ[cite: 3]
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 3]
            labelContainer = document.getElementById("label-container");[cite: 3]
            labelContainer.innerHTML = `<div class="prediction-row" style="justify-content: center;"><span class="class-name">กำลังประมวลผลวิเคราะห์ภาพ...</span></div>`;
            
            startBtn.innerText = "ระบบกล้องกำลังทำงาน";
            
            // รันการทำนายผลลัพธ์รอบแรกทันที
            await predict();
            lastPredictTime = Date.now();
            
            // สั่งรันลูปเพื่อให้ภาพเคลื่อนไหวต่อเนื่อง[cite: 3]
            window.requestAnimationFrame(loop);[cite: 3]
            
        } catch (error) {
            console.error(error);
            startBtn.disabled = false;
            startBtn.innerText = "เกิดข้อผิดพลาด ลองใหม่อีกครั้ง";
            alert("ไม่สามารถเข้าถึงกล้องหรือโหลดโมเดลได้ กรุณาตรวจสอบสิทธิ์การเปิดกล้องบนเบราว์เซอร์");
        }
    }

    // ลูปหลักเพื่อให้กล้องขยับได้ลื่นไหลปกติแบบสด ๆ[cite: 3]
    async function loop() {
        if (webcam) {
            webcam.update(); // อัปเดตเฟรมภาพเคลื่อนไหวของกล้อง[cite: 3]
            
            // เช็คเวลาปัจจุบันเปรียบเทียบกับเวลาล่าสุด หากผ่านไปครบ 3 วินาที (3,000 มิลลิวินาที) ให้ทำนายใหม่
            const currentTime = Date.now();
            if (currentTime - lastPredictTime >= 3000) {
                await predict();
                lastPredictTime = currentTime; // บันทึกเวลาล่าสุดเก็บไว้
            }
        }
        window.requestAnimationFrame(loop);[cite: 3]
    }

    // ฟังก์ชันประมวลผลภาพจากกล้องเข้าสู่โมเดล
    async function predict() {
        if (!model || !webcam) return;
        
        // รับข้อมูลทำนายผลสด ๆ จากกล้อง[cite: 3]
        const prediction = await model.predict(webcam.canvas);[cite: 3]
        
        // ตรวจสอบความปลอดภัยของข้อมูล
        if (!prediction || prediction.length === 0) return;
        
        // เคลียร์กล่องข้อความชั่วคราวแล้ววาดใหม่จากข้อมูลจริง เพื่อป้องกันบั๊กแถบสีเทาค้าง
        labelContainer.innerHTML = "";
        
        // วนลูปตามจำนวนคลาสที่ได้จากการ predict จริง ๆ
        for (let i = 0; i < prediction.length; i++) {
            const className = prediction[i].className;[cite: 3]
            // เปลี่ยนค่าทศนิยม เช่น 0.89 ให้แสดงผลเป็นเปอร์เซ็นต์อ่านง่าย เช่น 89%
            const probabilityPercentage = (prediction[i].probability * 100).toFixed(0) + "%";
            
            const row = document.createElement("div");
            row.className = "prediction-row";
            
            // หากคลาสไหนมีความน่าจะเป็นเกิน 50% ให้ทำการไฮไลต์แถบเป็นสีม่วงอินดิโก้สวยงาม
            if (prediction[i].probability > 0.5) {
                row.style.borderLeft = "4px solid var(--primary-color)";
                row.style.backgroundColor = "#e0e7ff";
            } else {
                row.style.borderLeft = "4px solid #cbd5e1";
                row.style.backgroundColor = "#f1f5f9";
            }
            
            row.innerHTML = `
                <span class="class-name">${className}</span>
                <span class="probability">${probabilityPercentage}</span>
            `;
            
            labelContainer.appendChild(row);
        }
    }
</script>

</body>
</html>
